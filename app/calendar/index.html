<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sinensthesia | Event Schedule</title>

        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
        <script src="../../utilities/particles.js"></script>
        <script src="calendar.js"></script>

        <style>
            body {
                background-color: #f8f4ec;
                font-family: Garamond, 'Times New Roman', serif;
                color: #000080;
                padding: 20px;
                margin: 0;
                position: relative;
            }

            a {
                color: #000080;
                text-decoration: none;
            }

            body.is-embedded {
                padding: 0 !important;
                background-color: #fdfbf5 !important;
                background-image: none !important;
                overflow: hidden;
                height: auto;
            }

            body.is-embedded #calendar-container,
            body.is-embedded .sidebar-legend {
                background-color: transparent !important;
                box-shadow: none !important;
                border: none !important;
                backdrop-filter: none !important;
                padding: 15px !important;
            }

            body.is-embedded #page-header {
                display: none !important;
            }

            #calendar-container,
            .sidebar-legend {
                background-color: rgba(255, 255, 255, 0.95);
                padding: 15px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0, 0, 128, 0.08);
                box-sizing: border-box;
                backdrop-filter: blur(2px);
            }

            #page-header {
                text-align: center;
                margin-bottom: 20px;
            }

            #particle-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -1;
                pointer-events: none;
                overflow: hidden;
                opacity: 0;
                transition: opacity 0.5s ease-in-out;
            }

            #particle-container.particles-visible {
                opacity: 1;
            }

            .brand-title {
                font-size: 2.5em;
                margin: 0;
                font-weight: normal;
                letter-spacing: 1px;
            }

            .fc .fc-today-button:disabled {
                opacity: 1 !important;
                pointer-events: auto !important;
                cursor: pointer !important;
                background-color: transparent !important;
                color: inherit !important;
                border-color: rgba(0, 35, 102, 0.2) !important;
                filter: brightness(0.85);
            }

            .fc .fc-today-button:not(:disabled) {
                filter: none;
            }

            .fc-button-primary {
                background-color: transparent !important;
                border: 1px solid rgba(0, 0, 128, 0.2) !important;
                color: #000080 !important;
                box-shadow: none !important;
                padding: 2px 10px !important;
            }

            .fc-col-header-cell-cushion {
                font-size: 1.1em;
                padding: 10px 0 !important;
                color: #002366;
            }

            .fc-toolbar.fc-header-toolbar {
                margin-bottom: 10px !important;
            }
            /* --- CALENDAR CELL STRUCTURE (UNIFORMITY & CENTERING FIXES) --- */

            /* 1. The Frame (Stacks date on top, logo below) */
            .fc-daygrid-day-frame {
                display: flex !important;
                flex-direction: column !important;
                height: 100% !important;
                min-height: 100% !important; /* Ensure uniform base height */
            }

            /* 2. Desktop Dates (Standard top-right alignment, NO absolute positioning) */
            .fc-daygrid-day-top {
                display: flex !important;
                justify-content: flex-end !important;
                align-items: center !important;
                width: 100% !important;
                padding: 0px 4px !important;
                margin-bottom: -8px;
                box-sizing: border-box !important;
            }

            .fc-daygrid-day-number {
                font-size: 1.1em;
                color: #002366;
                opacity: 0.8;
                text-decoration: none !important;
            }

            /* 3. The Events Container (Fills space BELOW the date, ensuring empty cells don't collapse) */
            .fc-daygrid-day-events {
                flex-grow: 1 !important; /* Stretches to fill empty space */
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important;
                align-items: center !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                min-height: 70px !important; /* Matches max logo height so empty cells look identical to full ones */
            }

            /* 4. Fix FullCalendar Wrappers */
            .fc-daygrid-event-harness,
            .fc-event,
            .fc-event-main {
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
            }

            /* 5. The Logo */
            .fc-event img {
                display: block !important;
                margin: 0 auto !important;
                max-height: 80px !important;
                max-width: 85% !important;
                width: auto;
                object-fit: contain;
            }

            .fc-theme-standard td,
            .fc-theme-standard th {
                border-color: rgba(0, 35, 102, 0.1) !important;
            }

            .fc-toolbar-chunk {
                width: 33.333%;
            }

            .fc-toolbar-chunk:nth-child(1) {
                display: flex;
                justify-content: flex-start;
            }

            .fc-toolbar-chunk:nth-child(2) {
                display: flex;
                justify-content: center;
            }

            .fc-toolbar-chunk:nth-child(3) {
                display: flex;
                justify-content: flex-end;
            }

            .fc-toolbar-title {
                font-family: Garamond, 'Times New Roman', serif !important;
                font-size: 2.2em !important;
                font-style: italic;
                color: #000080;
            }

            .layout-wrapper {
                display: flex;
                flex-direction: column;
                gap: 20px;
                max-width: 1400px;
                margin: 0 auto;
                height: auto; /* Ensure it grows with content */
            }

            /* Sidebar Legend Styles */
            .legend-dates {
                font-style: italic;
                font-size: 0.9em;
                opacity: 0.8;
                margin-top: 2px;
            }

            .legend-empty {
                font-style: italic;
                font-size: 0.9em;
                opacity: 0.6;
            }

            .legend-item {
                display: flex;
                align-items: center;
                font-size: 1.05em;
            }

            .legend-list {
                list-style: none;
                padding: 0;
                margin: 0;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .legend-location {
                font-size: 0.85em;
                margin-top: 3px;
                display: inline-flex;
                align-items: center;
                opacity: 0.8;
            }

            .legend-location:hover {
                opacity: 1;
                text-decoration: underline;
            }

            .legend-logo {
                width: 80px;
                height: auto;
                margin-right: 15px;
                border-radius: 4px;
                flex-shrink: 0;
            }

            .legend-logo:hover {
                opacity: 0.8;
                transform: scale(1.02);
                transition: all 0.2s ease;
            }

            .legend-text {
                display: flex;
                flex-direction: column;
            }

            .legend-title {
                font-weight: bold;
                line-height: 1.2;
            }

            .particle {
                position: absolute;
                animation-timing-function: ease-in-out;
                animation-iteration-count: infinite;
            }

            .particle-bright {
                animation-name: float-bright;
            }

            .particle-subtle {
                animation-name: float-subtle;
            }

            .sidebar-section {
                margin-bottom: 30px;
            }

            .sidebar-title {
                margin-top: 0;
                font-style: italic;
                border-bottom: 1px solid rgba(0, 0, 128, 0.15);
                padding-bottom: 8px;
                margin-bottom: 15px;
                font-size: 1.6em;
            }

            @keyframes float-bright {
                0% {
                    transform: translateY(0px) rotate(0deg);
                    opacity: 0.7;
                }
                100% {
                    transform: translateY(0px) rotate(360deg);
                    opacity: 0.7;
                }
                50% {
                    transform: translateY(-15px) rotate(180deg);
                    opacity: 0.3;
                }
            }

            @keyframes float-subtle {
                0% {
                    transform: translateY(0px) rotate(0deg);
                    opacity: 0.3;
                }
                100% {
                    transform: translateY(0px) rotate(360deg);
                    opacity: 0.3;
                }
                50% {
                    transform: translateY(-20px) rotate(180deg);
                    opacity: 0.1;
                }
            }

            @media (min-width: 1400px) {
                body.is-embedded .sidebar-legend {
                    border-left: 1px solid rgba(0, 35, 102, 0.1);
                }

                #calendar-container {
                    flex: 3.5;
                }

                .fc-event img {
                    padding-bottom: 10px;
                }

                .layout-wrapper {
                    flex-direction: row;
                    align-items: flex-start;
                    height: auto;
                }

                .sidebar-legend {
                    flex: 1;
                    top: 20px;
                    height: auto;
                    overflow-y: visible !important;
                }
            }

            @media (max-width: 1399px) {
                body {
                    padding: 10px !important;
                }

                .fc {
                    height: auto !important;
                    min-height: 500px;
                }

                .fc-daygrid-day-frame {
                    min-height: 70px !important;
                }

                /* Mobile: Force the date row to center its content */
                .fc-daygrid-day-top {
                    justify-content: center !important;
                }

                /* Mobile: Center the text inside the number block */
                .fc-daygrid-day-number {
                    text-align: center !important;
                }

                /* Adjust empty cell min-height for mobile to match mobile image size */
                .fc-daygrid-day-events {
                    min-height: 45px !important;
                }

                .fc-event img {
                    max-height: 45px !important;
                }

                /* --- MOBILE HEADER TOOLBAR FIX FOR LONG MONTHS --- */
                .fc-header-toolbar {
                    gap: 5px !important; /* Small gap between buttons and text */
                }

                .fc-header-toolbar .fc-toolbar-chunk {
                    width: auto !important; /* Remove the 33% width constraint */
                }

                .fc-header-toolbar .fc-toolbar-chunk:nth-child(1) {
                    flex-shrink: 0 !important; /* Keep buttons full size */
                }

                .fc-header-toolbar .fc-toolbar-chunk:nth-child(2) {
                    display: flex !important;
                    justify-content: flex-end !important;
                    flex-grow: 1 !important; /* Push text to the right by taking up leftover space */
                }

                .fc-header-toolbar .fc-toolbar-chunk:nth-child(3) {
                    display: none !important; /* Hide empty right chunk entirely on mobile */
                }

                .fc-toolbar-title {
                    text-align: right !important;
                    font-size: 1.15em !important; /* Slightly smaller for mobile */
                    margin: 0 !important;
                    white-space: nowrap !important; /* Prevent text from stacking awkwardly */
                }
                /* ------------------------------------------------- */

                .sidebar-legend {
                    padding: 20px !important;
                    width: 100% !important;
                }

                .legend-logo {
                    width: 60px !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="particle-container"></div>
        <a href="../../">
            <header id="page-header"><h1 class="brand-title">Sinensthesia</h1></header>
        </a>
        <div class="layout-wrapper">
            <div id="calendar-container"><div id="calendar"></div></div>
            <aside class="sidebar-legend">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Markets</h3>
                    <ul class="legend-list" id="legend-markets"></ul>
                </div>
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Events</h3>
                    <ul class="legend-list" id="legend-events"></ul>
                </div>
                <div class="sidebar-section">
                    <h3
                        class="sidebar-title"
                        style="color: #b30000; border-bottom-color: rgba(179, 0, 0, 0.15)"
                    >
                        Cancellations
                    </h3>
                    <ul class="legend-list" id="legend-cancelled"></ul>
                </div>
            </aside>
        </div>
    </body>
</html>
