<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinensthesia | App Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css" />
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF5; color: #1E2A4A; }
        h1, h2 { font-family: 'Cormorant Garamond', serif; }
        .bg-brand-blue { background-color: #002366; }
        .text-brand-blue { color: #0505af; }

        /* Clean framework for layout baseline container */
        #particle-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .app-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }
        .app-card:hover svg {
            color: #34D399;
        }
        .app-card:hover {
            transform: translateY(-10px);
            border-color: rgba(5, 5, 175, 0.2);
            box-shadow: 0 20px 25px -5px rgba(0, 35, 102, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex justify-center p-6 overflow-x-hidden overflow-y-auto py-12 md:items-center">
    <div id="particle-container"></div>

    <div class="relative z-10 max-w-4xl w-full text-center">
        <div class="mb-12">
            <a href="../" class="logo-link inline-block">
                <img src="../Resources/Web/Icon/Blue/Sinensthesia-Logo-Teacup-Icon-RGB.png"
                     alt="Sinensthesia Home" class="h-28 w-28 mx-auto mb-4">
            </a>
            <h1 class="text-5xl md:text-6xl text-brand-blue mb-2">Vibe Codium</h1>
            <p class="text-lg opacity-60 tracking-widest uppercase">Select a tool to begin</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <a href="calendar/" class="app-card bg-white p-8 rounded-3xl shadow-sm group">
                <div class="h-16 w-16 bg-[#F6F4EE] rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-brand-blue group-hover:text-white transition-colors">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <h2 class="text-3xl text-brand-blue mb-2">Calendar</h2>
                <p class="text-sm opacity-60">Market dates & event schedules</p>
            </a>

            <a href="invoice/" class="app-card bg-white p-8 rounded-3xl shadow-sm group">
                <div class="h-16 w-16 bg-[#F6F4EE] rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-brand-blue group-hover:text-white transition-colors">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <h2 class="text-3xl text-brand-blue mb-2">Invoices</h2>
                <p class="text-sm opacity-60">Catering billing & client statements</p>
            </a>

            <a href="sales/" class="app-card bg-white p-8 rounded-3xl shadow-sm group">
                <div class="h-16 w-16 bg-[#F6F4EE] rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-brand-blue group-hover:text-white transition-colors">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h2 class="text-3xl text-brand-blue mb-2">Sales</h2>
                <p class="text-sm opacity-60">Revenue tracking & seasonal analytics</p>
            </a>
        </div>
    </div>

    <!-- Import Particle Utility -->
    <script src="../utilities/particles.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize particles via utility script
            if (typeof initParticles === 'function') {
                initParticles({
                    containerId: 'particle-container',
                    textSelector: '#does-not-exist', // Forces full screen background scattering behind the grid
                    imagePaths: [
                        '../Resources/KrikosInner.png',
                        '../Resources/StellaInner.png'
                    ]
                });
            } else {
                console.warn('initParticles is not defined. Ensure utilities/particles.js is loaded.');
            }
        });
    </script>
</body>
</html>
